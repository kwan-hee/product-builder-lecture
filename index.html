
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>로또 번호 추천기 (6/45)</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: rgba(255,255,255,0.08);
      --text: #eaf0ff;
      --muted: rgba(234,240,255,0.75);
      --border: rgba(255,255,255,0.14);
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
    }
    body[data-theme="light"] {
        --bg: #f4f6f8;
        --card: #ffffff;
        --text: #212529;
        --muted: #6c757d;
        --border: #dee2e6;
        --shadow: 0 12px 40px rgba(0,0,0,0.1);
        background: var(--bg);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, sans-serif;
      background:
        radial-gradient(900px 450px at 20% 10%, rgba(40, 167, 69, 0.25), transparent 55%),
        radial-gradient(800px 400px at 80% 20%, rgba(165, 101, 255, 0.22), transparent 55%),
        radial-gradient(700px 380px at 50% 90%, rgba(0, 255, 209, 0.15), transparent 60%),
        var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .wrap {
      width: min(760px, 100%);
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    h1 { margin: 0 0 8px; font-size: 22px; letter-spacing: -0.2px; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      align-items: center;
    }
    button, a.button {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.10);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: transform .06s ease, background .15s ease, border-color .15s ease;
      text-decoration: none;
      display: inline-block;
    }
    button:hover, a.button:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.22); }
    button:active, a.button:active { transform: translateY(1px); }
    button.primary, a.button.primary {
      background: rgba(40, 167, 69, 0.2);
      border-color: rgba(40, 167, 69, 0.4);
    }
    button.danger, a.button.danger {
      background: rgba(255, 90, 90, 0.14);
      border-color: rgba(255, 90, 90, 0.32);
    }
    .nums {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      min-height: 54px;
      align-items: center;
    }
    .ball {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: -0.4px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      user-select: none;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .meta code {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 2px 6px;
      border-radius: 8px;
      color: var(--text);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 720px) {
      .grid { grid-template-columns: 1.3fr 1fr; }
    }
    .history {
      margin-top: 10px;
      display: grid;
      gap: 8px;
      max-height: 270px;
      overflow: auto;
      padding-right: 6px;
    }
    .hist-item {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 12px;
      display: grid;
      gap: 6px;
    }
    .hist-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      font-size: 12px;
      color: var(--muted);
    }
    .hist-nums {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hist-nums .ball {
      width: 34px;
      height: 34px;
      font-size: 13px;
    }
    .toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      backdrop-filter: blur(8px);
      font-size: 13px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-6px);
    }
    body[data-theme="light"] .card {
        background: var(--card);
        border-color: var(--border);
        box-shadow: var(--shadow);
    }
    body[data-theme="light"] p { color: var(--muted); }
    body[data-theme="light"] h1 { color: var(--text); }
    body[data-theme="light"] button, body[data-theme="light"] a.button {
        border-color: #ced4da;
        background: #f8f9fa;
        color: #495057;
    }
    body[data-theme="light"] button:hover, body[data-theme="light"] a.button:hover { background: #e9ecef; border-color: #b1b9c1; }
    body[data-theme="light"] button.primary, body[data-theme="light"] a.button.primary {
        background: #28a745;
        border-color: #28a745;
        color: #fff;
    }
    body[data-theme="light"] button.danger, body[data-theme="light"] a.button.danger {
        background: #dc3545;
        border-color: #dc3545;
        color: #fff;
    }
    body[data-theme="light"] .ball {
        border-color: #dee2e6;
        background: #f8f9fa;
        color: #343a40;
    }
     body[data-theme="light"] .meta code {
        background: #e9ecef;
        border-color: #dee2e6;
        color: #212529;
    }
    body[data-theme="light"] .hist-item {
        border-color: #e9ecef;
        background: #f8f9fa;
    }
     body[data-theme="light"] .hist-top { color: #6c757d; }
     body[data-theme="light"] .toast {
        background: rgba(33,37,41,0.85);
        border: 1px solid rgba(255,255,255,0.05);
        color: #fff;
     }
    .form-group {
      display: grid;
      gap: 6px;
    }
    .form-group label {
      font-size: 14px;
      color: var(--muted);
    }
    .form-group input, .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: inherit;
    }
    body[data-theme="light"] .form-group input, body[data-theme="light"] .form-group textarea {
      background: #f8f9fa;
      border-color: #dee2e6;
      color: #212529;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>로또 번호 추천기 (6/45)</h1>
      <p>버튼을 누르면 1~45 사이 숫자 6개를 <b>중복 없이</b> 뽑아 <b>오름차순</b>으로 보여줍니다. (재미용!)</p>

      <div class="row">
        <button class="primary" id="btnPick">번호 추천</button>
        <button id="btnCopy">현재 번호 복사</button>
        <button class="danger" id="btnClear">기록 삭제</button>
        <button id="btnTheme">테마 변경</button>
        <a href="/animal-test.html" class="button">동물상 테스트</a>
      </div>

      <div class="nums" id="nums" aria-label="추천 번호 영역"></div>

      <div class="meta">
        <span>범위: <code>1~45</code></span>
        <span>개수: <code>6개</code></span>
        <span>정렬: <code>오름차순</code></span>
        <span>기록: <code>최대 20개</code></span>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h1 style="font-size:18px;margin-bottom:8px;">사용 팁</h1>
        <p style="margin-bottom:10px;">
          같은 번호가 여러 번 나올 수는 있지만(확률), 한 번 추천된 6개 안에서는 중복이 없어요.
          브라우저에 자동으로 기록을 저장해두니, 새로고침해도 남아있습니다.
        </p>
        <p style="color: var(--muted); font-size: 13px;">
          참고: 로또는 랜덤이 곧 랜덤이라 “필승 조합”은 없어요 😅
        </p>
      </div>

      <div class="card">
        <h1 style="font-size:18px;margin-bottom:8px;">최근 추천 기록</h1>
        <div class="history" id="history"></div>
      </div>
    </div>
    
    <div class="card">
        <h1 style="font-size:18px;margin-bottom:12px;">제휴 문의</h1>
        <form action="https://formspree.io/f/mojkawya" method="POST">
            <div class="form-group" style="margin-bottom: 12px;">
                <label for="email">답변받으실 이메일</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="4" required></textarea>
            </div>
            <button type="submit" class="primary">보내기</button>
        </form>
    </div>

    <div class="card">
        <h1 style="font-size:18px;margin-bottom:12px;">댓글</h1>
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */

            var d = document, s = d.createElement('script');
            s.src = 'https://bibecoding.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const $nums = document.getElementById('nums');
    const $history = document.getElementById('history');
    const $toast = document.getElementById('toast');

    const STORAGE_KEY = 'lotto_history_v1';
    const THEME_KEY = 'lotto_theme_v1';
    const MAX_HISTORY = 20;

    function showToast(message) {
      $toast.textContent = message;
      $toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => $toast.classList.remove('show'), 1400);
    }

    function secureRandomInt(min, max) {
      // min/max inclusive
      const range = max - min + 1;
      const maxUint = 0xFFFFFFFF;
      const bucketSize = Math.floor((maxUint + 1) / range) * range;
      const arr = new Uint32Array(1);

      while (true) {
        crypto.getRandomValues(arr);
        const x = arr[0];
        if (x < bucketSize) {
          return min + (x % range);
        }
      }
    }

    function pickLottoNumbers() {
      const set = new Set();
      while (set.size < 6) {
        set.add(secureRandomInt(1, 45));
      }
      return Array.from(set).sort((a, b) => a - b);
    }

    function renderBalls(container, numbers) {
      container.innerHTML = '';
      numbers.forEach(n => {
        const el = document.createElement('div');
        el.className = 'ball';
        el.textContent = n;
        container.appendChild(el);
      });
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
      } catch {
        return [];
      }
    }

    function saveHistory(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list.slice(0, MAX_HISTORY)));
    }

    function formatKST(ts) {
      const d = new Date(ts);
      // 브라우저 로컬 타임 기준으로 표시 (한국이면 KST)
      return d.toLocaleString('ko-KR', { hour12: false });
    }

    function renderHistory() {
      const hist = loadHistory();
      $history.innerHTML = '';

      if (hist.length === 0) {
        const empty = document.createElement('p');
        empty.style.color = 'rgba(234,240,255,0.7)';
        empty.style.margin = '0';
        empty.textContent = '아직 기록이 없어요. “번호 추천”을 눌러보세요!';
        $history.appendChild(empty);
        return;
      }

      hist.forEach(item => {
        const wrap = document.createElement('div');
        wrap.className = 'hist-item';

        const top = document.createElement('div');
        top.className = 'hist-top';
        const left = document.createElement('div');
        left.textContent = formatKST(item.ts);
        const right = document.createElement('button');
        right.textContent = '복사';
        right.style.padding = '6px 10px';
        right.style.borderRadius = '10px';
        right.style.fontWeight = '800';
        right.addEventListener('click', async () => {
          const text = item.nums.join(', ');
          try {
            await navigator.clipboard.writeText(text);
            showToast('기록 번호를 복사했어요');
          } catch {
            fallbackCopy(text);
            showToast('기록 번호를 복사했어요');
          }
        });

        top.appendChild(left);
        top.appendChild(right);

        const nums = document.createElement('div');
        nums.className = 'hist-nums';
        renderBalls(nums, item.nums);

        wrap.appendChild(top);
        wrap.appendChild(nums);
        $history.appendChild(wrap);
      });
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    function setCurrent(numbers) {
      window.__current = numbers;
      renderBalls($nums, numbers);
    }
    
    function applyTheme(theme) {
        document.body.dataset.theme = theme;
    }

    function loadTheme() {
        return localStorage.getItem(THEME_KEY) || 'dark';
    }

    function saveTheme(theme) {
        localStorage.setItem(THEME_KEY, theme);
    }

    document.getElementById('btnPick').addEventListener('click', () => {
      const numbers = pickLottoNumbers();
      setCurrent(numbers);

      const hist = loadHistory();
      hist.unshift({ ts: Date.now(), nums: numbers });
      saveHistory(hist);
      renderHistory();

      showToast('새 번호를 추천했어요!');
    });

    document.getElementById('btnCopy').addEventListener('click', async () => {
      const cur = window.__current;
      if (!cur || cur.length !== 6) {
        showToast('먼저 번호를 추천받아 주세요');
        return;
      }
      const text = cur.join(', ');
      try {
        await navigator.clipboard.writeText(text);
        showToast('현재 번호를 복사했어요');
      } catch {
        fallbackCopy(text);
        showToast('현재 번호를 복사했어요');
      }
    });

    document.getElementById('btnClear').addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      renderHistory();
      showToast('기록을 삭제했어요');
    });
    
    document.getElementById('btnTheme').addEventListener('click', () => {
        const currentTheme = loadTheme();
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        applyTheme(newTheme);
        saveTheme(newTheme);
        showToast(newTheme === 'dark' ? '다크 모드로 변경했어요' : '라이트 모드로 변경했어요');
    });

    // 초기 로드
    renderHistory();
    setCurrent([].slice()); // 비워두기
    applyTheme(loadTheme());
  </script>
</body>
</html>
