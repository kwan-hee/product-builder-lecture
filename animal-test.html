    <div class="wrap">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/nou2mW8Kj/";
        let model, labelContainer, maxPredictions;

        const uploadButton = document.getElementById('upload-button');
        const imagePreview = document.getElementById('image-preview');

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.classList.add("result-item");
                labelContainer.appendChild(div);
            }
            
            uploadButton.textContent = "사진 선택하기";
            uploadButton.disabled = false;
        }
        
        init();

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                predict();
            };
            reader.readAsDataURL(file);
        }

        async function predict() {
            const prediction = await model.predict(imagePreview);
            let maxProb = 0;
            let maxIndex = -1;

            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > maxProb) {
                    maxProb = prediction[i].probability;
                    maxIndex = i;
                }
            }
            
            for (let i = 0; i < maxPredictions; i++) {
                const isMax = (i === maxIndex);
                const probText = (prediction[i].probability * 100).toFixed(1) + "%";
                let className = prediction[i].className;

                if (className === 'Class 1'){
                    className = '강아지상';
                } else if(className === 'Class 2'){
                    className = '고양이상';
                }

                let text = `${className}: ${probText}`;

                if (isMax) {
                    text = `👑 ${text}`;
                    labelContainer.childNodes[i].style.color = '#0d6efd';
                } else {
                    labelContainer.childNodes[i].style.color = '#6c757d';
                }

                labelContainer.childNodes[i].innerHTML = text;
            }
        }
    </script>
